          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResult"
  /v1/auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get the authenticated user, org, tier and feature flags
      responses:
        "200":
          description: Current session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResult"
        "401": { description: Unauthenticated }
  /v1/watch/status:
    get:
      operationId: getWatchStatus
      tags: [watch]
      summary: Security Watch runtime status (sampler + ffmpeg availability)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchStatus"
  /v1/watch/recognize:
    post:
      operationId: recognizeWatchImage
      tags: [watch]
      summary: Analyze one photo — objects, member faces, plates, watch-target matches (read-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchRecognizeInput"
      responses:
        "200":
          description: Recognition results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchRecognitionResult"
        "400": { description: imageBase64 missing }
        "422": { description: Image could not be decoded/processed }
  /v1/watch/cameras:
    get:
      operationId: listWatchCameras
      tags: [watch]
      summary: List registered cameras
      responses:
        "200":
          description: Cameras
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchCameraList"
    post:
      operationId: createWatchCamera
      tags: [watch]
      summary: Register a camera stream (owner/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatchCameraInput"
      responses:
        "201":
          description: Camera created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchCamera"
        "400": { description: Invalid input }
        "403": { description: Requires owner or admin role }
  /v1/watch/cameras/{id}:
    patch:
      operationId: updateWatchCamera
      tags: [watch]
      summary: Update a camera (owner/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWatchCameraInput"
      responses:
        "200":
          description: Updated camera
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchCamera"
        "404": { description: Not found }
    delete:
      operationId: deleteWatchCamera
      tags: [watch]
      summary: Delete a camera (owner/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "404": { description: Not found }
  /v1/watch/dvr/test:
    post:
      operationId: testWatchDvr
      tags: [watch]
      summary: Probe one DVR/NVR channel by grabbing a frame (owner/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DvrTestInput"
      responses:
        "200":
          description: Probe result (ok=false carries the connection error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DvrTestResult"
        "400": { description: Invalid DVR settings }
        "403": { description: Requires owner or admin role }
        "503": { description: ffmpeg unavailable on the server }
  /v1/watch/dvr/import:
    post:
      operationId: importWatchDvr
      tags: [watch]
      summary: Bulk-import DVR/NVR channels as cameras (owner/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DvrImportInput"
      responses:
        "201":
          description: Cameras created (one per channel)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchCameraList"
        "400": { description: Invalid DVR settings }
        "403": { description: Requires owner or admin role }
  /v1/watch/cameras/{id}/stream/start:
    post:
      operationId: startWatchCameraStream
      tags: [watch]
      summary: Start (or poll) the on-demand live HLS session for a camera
      description: Idempotent — poll until status is "live", then attach an HLS player to playlistUrl. Sessions stop automatically ~60s after the last playlist/segment fetch.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchStreamSession"
        "404": { description: Camera not found }
        "429": { description: All live stream slots are in use }
        "502": { description: Could not connect to the camera stream }
        "503": { description: ffmpeg unavailable on the server }
  /v1/watch/cameras/{id}/stream/stop:
    post:
      operationId: stopWatchCameraStream
      tags: [watch]
      summary: Stop the live HLS session (best effort — idle reaper is authoritative)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Stopped (or no session existed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
  /v1/watch/cameras/{id}/stream/{file}:
    get:
      operationId: getWatchCameraStreamFile
      tags: [watch]
      summary: Fetch the HLS playlist (index.m3u8) or a media segment of an active live session
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: file
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Za-z0-9_-]+\.(m3u8|ts|m4s|mp4)$' }
      responses:
        "200":
          description: HLS playlist or MPEG-TS segment
          content:
            application/vnd.apple.mpegurl:
              schema: { type: string, format: binary }
            video/mp2t:
              schema: { type: string, format: binary }
        "404": { description: No active live session or file not found }
  /v1/watch/targets:
    get:
      operationId: listWatchTargets
      tags: [watch]
      summary: List watch targets with reference image counts
      responses:
        "200":
          description: Targets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchTargetList"
    post:
      operationId: createWatchTarget
      tags: [watch]
      summary: Create a watch target with base64 reference images (owner/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatchTargetInput"
      responses:
        "201":
          description: Target created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchTargetCreated"
        "400": { description: Invalid input or no usable reference images }
        "403": { description: Requires owner or admin role }
  /v1/watch/targets/{id}:
    get:
      operationId: getWatchTarget
      tags: [watch]
      summary: Get a watch target with its reference images
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Target detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchTargetDetail"
        "404": { description: Not found }
    patch:
      operationId: updateWatchTarget
      tags: [watch]
      summary: Update a watch target (owner/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWatchTargetInput"
      responses:
        "200":
          description: Updated target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchTarget"
        "404": { description: Not found }
    delete:
      operationId: deleteWatchTarget
      tags: [watch]
      summary: Delete a watch target (owner/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "404": { description: Not found }
  /v1/watch/targets/{id}/images:
    post:
      operationId: addWatchTargetImages
      tags: [watch]
      summary: Add reference images to a watch target (owner/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWatchTargetImagesInput"
      responses:
        "201":
          description: Images added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddWatchTargetImagesResult"
        "400": { description: No usable images or limit reached }
        "404": { description: Not found }
  /v1/watch/targets/{id}/images/{imageId}:
    delete:
      operationId: deleteWatchTargetImage
      tags: [watch]
      summary: Delete a reference image (owner/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: imageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "404": { description: Not found }
  /v1/watch/sightings:
    get:
      operationId: listWatchSightings
      tags: [watch]
      summary: List sightings (newest first) with optional filters
      parameters:
        - name: targetId
          in: query
          schema: { type: string, format: uuid }
        - name: cameraId
          in: query
          schema: { type: string, format: uuid }
        - name: videoJobId
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Sightings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchSightingList"
  /v1/watch/sightings/{id}/snapshot:
    get:
      operationId: getWatchSightingSnapshot
      tags: [watch]
      summary: Fetch the JPEG snapshot captured for a sighting
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: JPEG image
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        "404": { description: Snapshot not found }
  /v1/watch/sightings/{id}:
    delete:
      operationId: deleteWatchSighting
      tags: [watch]
      summary: Delete a sighting (owner/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "404": { description: Not found }
  /v1/watch/videos:
    get:
      operationId: listWatchVideoJobs
      tags: [watch]
      summary: List offline video scan jobs
      responses:
        "200":
          description: Video jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchVideoJobList"
    post:
      operationId: uploadWatchVideo
      tags: [watch]
      summary: Upload a recording (multipart, max 500MB) and queue an offline scan (owner/admin)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: Scan job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchVideoJob"
        "413": { description: Video exceeds the 500MB limit }
        "503": { description: ffmpeg unavailable on this server }
  /v1/watch/videos/{id}:
    get:
      operationId: getWatchVideoJob
      tags: [watch]
      summary: Get an offline video scan job (poll for progress)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Video job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchVideoJob"
        "404": { description: Not found }
  /v1/ask-thea/conversations:
    get:
      operationId: listAskTheaConversations
      tags: [ask-thea]
      summary: List the current user's Ask THEA conversations (Pro tier)
      responses:
        "200":
          description: Conversations, most recently active first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConversationList"
        "402": { description: Requires Pro tier }
  /v1/ask-thea/conversations/{id}:
    get:
      operationId: getAskTheaConversation
      tags: [ask-thea]
      summary: Get a conversation with all its messages (Pro tier)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConversationDetail"
        "402": { description: Requires Pro tier }
        "404": { description: Not found }
    delete:
      operationId: deleteAskTheaConversation
      tags: [ask-thea]
      summary: Delete a conversation and its messages (Pro tier)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "402": { description: Requires Pro tier }
        "404": { description: Not found }
  /v1/ask-thea/ask:
    post:
      operationId: askThea
      tags: [ask-thea]
      summary: Ask a question — answers stream back as Server-Sent Events (Pro tier)
      description: >
        Responds as text/event-stream with events: meta ({conversationId, title}),
        sources ({citations}), token ({delta}), done ({conversationId, messageId,
        provider, model, usage}) and error ({error}). Omit conversationId to start
        a new conversation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskTheaInput"
      responses:
        "200":
          description: SSE stream of the assistant's answer
          content:
            text/event-stream:
              schema: { type: string }
        "400": { description: Invalid request }
        "402": { description: Requires Pro tier }
        "429": { description: Daily AI budget reached }

  /v1/ai-narrative/prompts:
    get:
      operationId: listAiNarrativePrompts
      tags: [ai-narrative]
      summary: List tracked AI narrative prompts (auto-seeds from watchlist on first access)
      responses:
        "200":
          description: Tracked prompts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativePromptList"
        "402": { description: Requires Pro tier }
    post:
      operationId: createAiNarrativePrompt
      tags: [ai-narrative]
      summary: Create a tracked prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NarrativePromptCreateInput"
      responses:
        "201":
          description: Created prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativePromptEnvelope"
        "400": { description: Invalid input }
        "402": { description: Requires Pro tier }
  /v1/ai-narrative/prompts/{promptId}:
    patch:
      operationId: updateAiNarrativePrompt
      tags: [ai-narrative]
      summary: Update a tracked prompt
      parameters:
        - name: promptId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NarrativePromptUpdateInput"
      responses:
        "200":
          description: Updated prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativePromptEnvelope"
        "404": { description: Prompt not found }
    delete:
      operationId: deleteAiNarrativePrompt
      tags: [ai-narrative]
      summary: Delete a tracked prompt
      parameters:
        - name: promptId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
        "404": { description: Prompt not found }
  /v1/ai-narrative/run:
    post:
      operationId: runAiNarrative
      tags: [ai-narrative]
      summary: Queue a manual AI narrative monitoring run
      responses:
        "202":
          description: Run queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeRunQueued"
        "402": { description: Requires Pro tier }
        "409": { description: A run is already in progress }
        "429": { description: Daily AI budget reached }
  /v1/ai-narrative/overview:
    get:
      operationId: getAiNarrativeOverview
      tags: [ai-narrative]
      summary: Latest AI narrative snapshot per entity with per-provider sentiment and deltas
      responses:
        "200":
          description: Narrative overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeOverview"
        "402": { description: Requires Pro tier }
  /v1/ai-narrative/timeline:
    get:
      operationId: getAiNarrativeTimeline
      tags: [ai-narrative]
      summary: Sentiment timeline for one entity (per provider, per run)
      parameters:
        - name: entity
          in: query
          required: true
          schema: { type: string }
        - name: days
          in: query
          schema: { type: integer, minimum: 1, maximum: 365, default: 30 }
      responses:
        "200":
          description: Timeline points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeTimeline"
        "400": { description: entity is required }
        "402": { description: Requires Pro tier }
  /v1/ai-narrative/runs:
    get:
      operationId: listAiNarrativeRuns
      tags: [ai-narrative]
      summary: Recent AI narrative monitoring runs
      responses:
        "200":
          description: Run history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeRunList"
        "402": { description: Requires Pro tier }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Session Bearer token (internal use)"
    cookieAuth:
      type: apiKey
      in: cookie
      name: thea_session
      description: "Session cookie set after login via POST /v1/auth/login"
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: "thea_<key>"
      description: "THEA Developer API key (Enterprise). Create via POST /v1/api-keys. Grants member-level read access."
  schemas:
    AuthUser:
      type: object
      required: [id, email, role, orgId]
      properties:
        id:    { type: string, format: uuid }
        email: { type: string }
        name:  { type: string, nullable: true }
        role:  { type: string }
        orgId: { type: string, format: uuid }
    AuthOrg:
      type: object
      required: [id, name, slug]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        onboardingCompletedAt: { type: string, format: date-time, nullable: true }
    RegisterInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string }
        password: { type: string }
        name:     { type: string }
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string }
        password: { type: string }
    RegisterResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, org, token, expiresAt]
          properties:
            user:      { $ref: "#/components/schemas/AuthUser" }
            org:       { $ref: "#/components/schemas/AuthOrg" }
            token:     { type: string }
            expiresAt: { type: string, format: date-time }
    LoginResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, token, expiresAt]
          properties:
            user:      { $ref: "#/components/schemas/AuthUser" }
            token:     { type: string }
            expiresAt: { type: string, format: date-time }
    MeResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, org, tier, featureFlags]
          properties:
            user:         { $ref: "#/components/schemas/AuthUser" }
            org:          { $ref: "#/components/schemas/AuthOrg" }
            tier:         { type: string, enum: [starter, pro, enterprise] }
            featureFlags: { type: array, items: { type: string } }
    LogoutResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [success]
          properties:
            success: { type: boolean }
    Wallet:
      type: object
      properties:
        id: { type: string, format: uuid }
        balance: { type: string, description: "USD-pegged balance as a decimal string, e.g. '12.5'" }
        balanceMicro: { type: string, description: "Balance in micro-USD integer base units (as a string to preserve precision)" }
        currency: { type: string }
        updatedAt: { type: string, format: date-time }
      required: [id, balance, balanceMicro, currency, updatedAt]
    WalletResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Wallet"
      required: [data]
    LedgerEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, description: "deposit | withdrawal_hold | withdrawal_refund | trade_buy | trade_sell | payout | refund | adjustment" }
        amount: { type: string, description: "Signed USD decimal string (credit > 0, debit < 0)" }
        amountMicro: { type: string }
        balanceAfter: { type: string, description: "Running balance after this entry, USD decimal string" }
        balanceAfterMicro: { type: string }
        refType: { type: string, nullable: true }
        refId: { type: string, nullable: true }
        memo: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, type, amount, amountMicro, balanceAfter, balanceAfterMicro, createdAt]
    LedgerEntryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"
      required: [data]
    DepositCoin:
      type: object
      properties:
        coin: { type: string, description: "btc | eth | bsc_usdt | cg" }
        label: { type: string }
        chain: { type: string, description: "bitcoin | ethereum | bsc" }
        kind: { type: string, description: "native | erc20" }
        decimals: { type: integer }
        minConfirmations: { type: integer }
        priceUsd: { type: string, description: "Spot price in USD per 1 coin, as a decimal string" }
      required: [coin, label, chain, kind, decimals, minConfirmations, priceUsd]
    DepositCoinList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DepositCoin"
      required: [data]
    DepositIntent:
      type: object
      properties:
        intentId: { type: string, format: uuid }
        coin: { type: string }
        chain: { type: string }
        kind: { type: string }
        tokenAddress: { type: string, nullable: true, description: "ERC-20/BEP-20 contract for token coins; null for native" }
        receivingAddress: { type: string, description: "Address to send the deposit to" }
        amount: { type: string, description: "EXACT amount to send, incl. dust suffix, as a decimal string" }
        amountBaseUnits: { type: string, description: "Exact expected amount in coin base units" }
        decimals: { type: integer }
        priceUsd: { type: string }
        requestedUsd: { type: string }
        minConfirmations: { type: integer }
        expiresAt: { type: string, format: date-time }
