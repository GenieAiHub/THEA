      responses:
        "200":
          description: Current session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResult"
        "401": { description: Unauthenticated }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Session Bearer token (internal use)"
    cookieAuth:
      type: apiKey
      in: cookie
      name: thea_session
      description: "Session cookie set after login via POST /v1/auth/login"
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: "thea_<key>"
      description: "THEA Developer API key (Enterprise). Create via POST /v1/api-keys. Grants member-level read access."
  schemas:
    AuthUser:
      type: object
      required: [id, email, role, orgId]
      properties:
        id:    { type: string, format: uuid }
        email: { type: string }
        name:  { type: string, nullable: true }
        role:  { type: string }
        orgId: { type: string, format: uuid }
    AuthOrg:
      type: object
      required: [id, name, slug]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        onboardingCompletedAt: { type: string, format: date-time, nullable: true }
    RegisterInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string }
        password: { type: string }
        name:     { type: string }
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string }
        password: { type: string }
    RegisterResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, org, token, expiresAt]
          properties:
            user:      { $ref: "#/components/schemas/AuthUser" }
            org:       { $ref: "#/components/schemas/AuthOrg" }
            token:     { type: string }
            expiresAt: { type: string, format: date-time }
    LoginResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, token, expiresAt]
          properties:
            user:      { $ref: "#/components/schemas/AuthUser" }
            token:     { type: string }
            expiresAt: { type: string, format: date-time }
    MeResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, org, tier, featureFlags]
          properties:
            user:         { $ref: "#/components/schemas/AuthUser" }
            org:          { $ref: "#/components/schemas/AuthOrg" }
            tier:         { type: string, enum: [starter, pro, enterprise] }
            featureFlags: { type: array, items: { type: string } }
    LogoutResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [success]
          properties:
            success: { type: boolean }
    Wallet:
      type: object
      properties:
        id: { type: string, format: uuid }
        balance: { type: string, description: "USD-pegged balance as a decimal string, e.g. '12.5'" }
        balanceMicro: { type: string, description: "Balance in micro-USD integer base units (as a string to preserve precision)" }
        currency: { type: string }
        updatedAt: { type: string, format: date-time }
      required: [id, balance, balanceMicro, currency, updatedAt]
    WalletResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Wallet"
      required: [data]
    LedgerEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, description: "deposit | withdrawal_hold | withdrawal_refund | trade_buy | trade_sell | payout | refund | adjustment" }
        amount: { type: string, description: "Signed USD decimal string (credit > 0, debit < 0)" }
        amountMicro: { type: string }
        balanceAfter: { type: string, description: "Running balance after this entry, USD decimal string" }
        balanceAfterMicro: { type: string }
        refType: { type: string, nullable: true }
        refId: { type: string, nullable: true }
        memo: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, type, amount, amountMicro, balanceAfter, balanceAfterMicro, createdAt]
    LedgerEntryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"
      required: [data]
    DepositCoin:
      type: object
      properties:
        coin: { type: string, description: "btc | eth | bsc_usdt | cg" }
        label: { type: string }
        chain: { type: string, description: "bitcoin | ethereum | bsc" }
        kind: { type: string, description: "native | erc20" }
        decimals: { type: integer }
        minConfirmations: { type: integer }
        priceUsd: { type: string, description: "Spot price in USD per 1 coin, as a decimal string" }
      required: [coin, label, chain, kind, decimals, minConfirmations, priceUsd]
    DepositCoinList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DepositCoin"
      required: [data]
    DepositIntent:
      type: object
      properties:
        intentId: { type: string, format: uuid }
        coin: { type: string }
        chain: { type: string }
        kind: { type: string }
        tokenAddress: { type: string, nullable: true, description: "ERC-20/BEP-20 contract for token coins; null for native" }
        receivingAddress: { type: string, description: "Address to send the deposit to" }
        amount: { type: string, description: "EXACT amount to send, incl. dust suffix, as a decimal string" }
        amountBaseUnits: { type: string, description: "Exact expected amount in coin base units" }
        decimals: { type: integer }
        priceUsd: { type: string }
        requestedUsd: { type: string }
        minConfirmations: { type: integer }
        expiresAt: { type: string, format: date-time }
      required: [intentId, coin, chain, kind, receivingAddress, amount, amountBaseUnits, decimals, priceUsd, requestedUsd, minConfirmations, expiresAt]
    DepositIntentResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DepositIntent"
      required: [data]
    DepositVerifyResult:
      type: object
      properties:
        success: { type: boolean }
        creditedUsd: { type: string, description: "USD credited to the wallet, decimal string" }
        balance: { type: string, description: "New wallet balance, USD decimal string" }
      required: [success, creditedUsd, balance]
    DepositHistoryItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        coin: { type: string }
        chain: { type: string }
        amount: { type: string }
        requestedUsd: { type: string }
        status: { type: string, description: "pending | confirmed | expired | failed" }
        txHash: { type: string, nullable: true }
        creditedUsd: { type: string, nullable: true }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, coin, chain, amount, requestedUsd, status, expiresAt, createdAt]
    DepositHistoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DepositHistoryItem"
      required: [data]
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DetailedHealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        services:
          type: object
          properties:
            database:
              type: string
            redis:
              type: string
            elasticsearch:
              type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [status, services, timestamp]
    ContentItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        platform: { type: string }
        title: { type: string, nullable: true }
        body: { type: string }
        author: { type: string, nullable: true }
        language: { type: string, nullable: true }
        category: { type: string, nullable: true }
        sentimentScore: { type: number, nullable: true }
        sourceUrl: { type: string, nullable: true }
        geoCountry: { type: string, nullable: true }
        collectedAt: { type: string, format: date-time }
    ContentItemList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
        pagination:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            offset: { type: integer }
    TrendScore:
      type: object
      properties:
        id: { type: string, format: uuid }
        topic: { type: string }
        category: { type: string }
        score: { type: number }
        lifecycleStage: { type: string, nullable: true }
        mentionCount: { type: integer, nullable: true }
        sentimentAvg: { type: number, nullable: true }
        scoredAt: { type: string, format: date-time }
    TrendScoreList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TrendScore"
        timeframe: { type: string }
    AnalysisReport:
      type: object
      properties:
        id: { type: string, format: uuid }
        category: { type: string }
        status: { type: string }
        narrativeSummary: { type: string, nullable: true }
        sentimentOverall: { type: string, nullable: true }
        itemsAnalyzed: { type: integer, nullable: true }
        runAt: { type: string, format: date-time }
    AnalysisReportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisReport"
    CreateWatchlistKeyword:
      type: object
      required: [keyword]
      properties:
        keyword: { type: string }
        type: { type: string, enum: [keyword, brand, person, competitor] }
        category: { type: string }
        notes: { type: string }
    UpdateWatchlistKeyword:
      type: object
      properties:
        type: { type: string, enum: [keyword, brand, person, competitor] }
        category: { type: string }
        notes: { type: string }
        isActive: { type: boolean }
    CreateCrawlerSource:
      type: object
      required: [name, url, category]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        type: { type: string, enum: [rss, crawl, api] }
        category: { type: string }
        language: { type: string }
        country: { type: string }
    CreateWebhook:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
    LlmMessage:
      type: object
      required: [role, content]
      properties:
        role:    { type: string, enum: [user, assistant, system] }
        content: { type: string }
    LlmChatInput:
      type: object
      required: [messages]
      properties:
        provider: { type: string, enum: [openai, gemini], default: openai }
        model:    { type: string }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/LlmMessage"
    LlmUsage:
      type: object
      properties:
        promptTokens:     { type: integer }
        completionTokens: { type: integer }
        totalTokens:      { type: integer }
    LlmReply:
      type: object
      properties:
        provider:  { type: string }
        model:     { type: string }
        content:   { type: string }
        usage:
          $ref: "#/components/schemas/LlmUsage"
        durationMs: { type: integer }
    PlatformConfig:
      type: object
      properties:
        id:          { type: string, format: uuid }
        key:         { type: string }
        category:    { type: string }
        label:       { type: string }
        description: { type: string, nullable: true }
        isSecret:    { type: boolean }
        isActive:    { type: boolean }
        hasValue:    { type: boolean }
        value:       { type: string, nullable: true }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
    PlatformConfigInput:
      type: object
      properties:
        value:       { type: string }
        label:       { type: string }
        description: { type: string }
        category:    { type: string }
        isSecret:    { type: boolean }
        isActive:    { type: boolean }
    BulkConfigInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [key, value]
            properties:
              key:   { type: string }
              value: { type: string }
    AnalysisRunInput:
      type: object
      properties:
        category: { type: string }
    MarketOption:
      type: object
      required: [label, votes, percentage]
      properties:
        label:      { type: string }
        votes:      { type: integer }
        percentage: { type: number }
    Market:
      type: object
      required: [id, question, category, options, totalVotes, status, createdAt]
      properties:
        id:             { type: string, format: uuid }
        question:       { type: string }
        description:    { type: string, nullable: true }
        category:       { type: string }
        options:
          type: array
          items:
            $ref: "#/components/schemas/MarketOption"
        totalVotes:     { type: integer }
        status:         { type: string, enum: [open, closed, resolved] }
        resolvedOption: { type: integer, nullable: true }
        source:         { type: string, enum: [auto, manual] }
        sourceTopic:    { type: string, nullable: true }
        closesAt:       { type: string, nullable: true, format: date-time }
        createdAt:      { type: string, format: date-time }
    MarketList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Market"
    MarketCategory:
      type: object
      required: [category, count]
      properties:
        category: { type: string }
        count:    { type: integer }
    MarketStats:
      type: object
      required: [totalMarkets, openMarkets, totalVotes, categories]
      properties:
        totalMarkets: { type: integer }
        openMarkets:  { type: integer }
        totalVotes:   { type: integer }
        categories:   { type: integer }
    MarketVoteInput:
      type: object
      required: [optionIndex, voterId]
      properties:
        optionIndex: { type: integer, minimum: 0 }
        voterId:     { type: string, minLength: 8, maxLength: 128 }
    MarketInput:
      type: object
      required: [question, category, options]
      properties:
        question:    { type: string, minLength: 1 }
        description: { type: string }
        category:    { type: string, minLength: 1 }
        options:
          type: array
          minItems: 2
          maxItems: 6
          items: { type: string, minLength: 1 }
        closesAt:    { type: string, format: date-time }
    MarketUpdate:
      type: object
      properties:
        question:       { type: string, minLength: 1 }
        description:    { type: string }
        category:       { type: string }
        status:         { type: string, enum: [open, closed, resolved] }
        resolvedOption: { type: integer, minimum: 0 }
        closesAt:       { type: string, nullable: true, format: date-time }
    MarketGenerationResult:
      type: object
      required: [generated, markets]
      properties:
        generated: { type: integer }
        markets:
          type: array
          items:
            $ref: "#/components/schemas/Market"
        message:   { type: string }
    MarketSettings:
      type: object
      required: [enabled, frequencyMinutes, topics, marketsPerRun]
      properties:
        enabled:          { type: boolean }
        frequencyMinutes: { type: integer }
        topics:
          type: array
          items: { type: string }
        marketsPerRun:    { type: integer }
        lastRunAt:        { type: string, nullable: true, format: date-time }
    MarketSettingsInput:
      type: object
      properties:
        enabled:          { type: boolean }
        frequencyMinutes: { type: integer, minimum: 5, maximum: 10080 }
        topics:
          type: array
          items: { type: string }
        marketsPerRun:    { type: integer, minimum: 1, maximum: 10 }
    GeoHeatmapEntry:
      type: object
      required: [countryCode, intensity, mentionCount]
      properties:
        countryCode:    { type: string }
        region:         { type: string, nullable: true }
        intensity:      { type: integer, minimum: 0, maximum: 100 }
        mentionCount:   { type: integer }
        avgSentiment:   { type: number, nullable: true }
    GeoHeatmapResult:
      type: object
      required: [data, topic, timeframe, totalCountries, generatedAt]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GeoHeatmapEntry"
        topic:          { type: string }
        timeframe:      { type: string }
        totalCountries: { type: integer }
        generatedAt:    { type: string, format: date-time }
    SovEntry:
      type: object
      required: [keyword, type, mentionCount, sharePercent, trend]
      properties:
        keyword:        { type: string }
        type:           { type: string }
        mentionCount:   { type: integer }
        sharePercent:   { type: number }
        avgSentiment:   { type: number, nullable: true }
        trend:          { type: string, enum: [up, down, stable] }
    ShareOfVoiceResult:
      type: object
      required: [entries, totalMentions, timeframe, generatedAt]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/SovEntry"
        totalMentions:  { type: integer }
        timeframe:      { type: string }
        generatedAt:    { type: string, format: date-time }
    CrisisScoreResult:
      type: object
      required: [score, velocityScore, sentimentScore, botScore, mediaPickupScore, spikeRatio]
      properties:
        score:              { type: integer, minimum: 0, maximum: 100 }
        velocityScore:      { type: integer }
        sentimentScore:     { type: integer }
        botScore:           { type: integer }
        mediaPickupScore:   { type: integer }
        sentimentShift:     { type: number }
        spikeRatio:         { type: number }
        volumeCurrent:      { type: number }
        volumeBaseline:     { type: number }
    KeywordAnalysisResult:
      type: object
      required: [keyword, liveScore, scoreHistory, recentAlerts, generatedAt]
      properties:
        keyword:
          type: object
        liveScore:
          $ref: "#/components/schemas/CrisisScoreResult"
        scoreHistory:
          type: array
          items: { type: object }
        recentAlerts:
          type: array
          items: { type: object }
        generatedAt: { type: string, format: date-time }
    OrganicConfidenceResult:
      type: object
      required: [topic, timeframe, organicConfidence, coordinatedItemRatio, avgBotRisk, highRiskCount, totalAnalyzed, coordinatedBurstCount]
      properties:
        topic:                  { type: string }
        timeframe:              { type: string }
        organicConfidence:      { type: integer, minimum: 0, maximum: 100 }
        coordinatedItemRatio:   { type: number }
        avgBotRisk:             { type: number }
        highRiskCount:          { type: integer }
        totalAnalyzed:          { type: integer }
        coordinatedBurstCount:  { type: integer, description: "Number of 30-min windows with 5+ distinct accounts posting (cross-account burst = astroturfing signal)" }
        flaggedAccounts:
          type: array
          items: { type: string }
    InfluencerEntry:
      type: object
      required: [platform, accountHandle, mentionCount, totalEngagement, reachScore, botRisk, isBotFlagged]
      properties:
        platform:         { type: string, nullable: true }
        accountHandle:    { type: string }
        mentionCount:     { type: integer }
        totalEngagement:  { type: integer }
        reachScore:       { type: number }
        botRisk:          { type: number }
        isBotFlagged:     { type: string, enum: ["true", "false"] }
    InfluencerListResult:
      type: object
      required: [topic, timeframe, count, data]
      properties:
        topic:    { type: string }
        timeframe: { type: string }
        count:    { type: integer }
        data:
          type: array
          items:
            $ref: "#/components/schemas/InfluencerEntry"
    DisinformationCheckResult:
      type: object
      required: [keyword, checked, results]
      properties:
        keyword:  { type: string }
        checked:  { type: integer }
        results:
          type: array
          items:
            type: object
            required: [itemId, claim, isDisinformation, confidence, reasoning]
            properties:
              itemId:           { type: string, format: uuid }
              claim:            { type: string }
              isDisinformation: { type: boolean }
              confidence:       { type: number, minimum: 0, maximum: 1 }
              reasoning:        { type: string }
    SimulateInput:
      type: object
      required: [scenario_text, category]
      properties:
        scenario_text: { type: string, minLength: 20 }
        category:      { type: string }
        geography:     { type: string }
        provider:      { type: string, enum: [openai, gemini, anthropic] }
    SimulateQueued:
      type: object
      required: [simulationId, status, message, pollUrl]
      properties:
        simulationId: { type: string, format: uuid }
        status:       { type: string, enum: [queued] }
        message:      { type: string }
        pollUrl:      { type: string }
    SimulationResult:
      type: object
      required: [simulationId, status, category, createdAt]
      properties:
        simulationId:       { type: string, format: uuid }
        status:             { type: string, enum: [pending, running, completed, failed] }
        category:           { type: string }
        scenario:           { type: string, nullable: true }
        geography:          { type: string, nullable: true }
        createdAt:          { type: string, format: date-time }
        completedAt:        { type: string, nullable: true, format: date-time }
        message:            { type: string }
        trendingTopics:     { type: array, items: { type: object } }
        narrativeSummary:   { type: string, nullable: true }
        sentimentOverall:   { type: string, nullable: true }
        predictions:        { type: array, items: { type: object } }
        dominantNarratives: { type: array, items: { type: object } }
        keyEntities:        { type: array, items: { type: object } }
    TalkingPointsInput:
      type: object
      required: [keyword]
      properties:
        keyword:          { type: string, description: "Keyword or topic to generate talking points for" }
        topic:            { type: string, description: "Alias for keyword" }
        context_override: { type: string, description: "Optional additional context to inject into the prompt" }
    TalkingPointsResult:
      type: object
      required: [keyword, keyFacts, recommendedPosition, phrasesToAvoid, suggestedQuotes, contextItemCount, generatedAt]
      properties:
        keyword:             { type: string }
        keyFacts:            { type: array, items: { type: string } }
        recommendedPosition: { type: string }
        phrasesToAvoid:      { type: array, items: { type: string } }
        suggestedQuotes:     { type: array, items: { type: string } }
        contextItemCount:    { type: integer }
        cachedAt:            { type: string, format: date-time }
        generatedAt:         { type: string, format: date-time }
    DraftStatementInput:
      type: object
      properties:
        keyword:   { type: string, description: "Topic keyword (required for new drafts)" }
        topic:     { type: string, description: "Alias for keyword" }
        tone:      { type: string, enum: [formal, empathetic, assertive], default: formal }
        type:      { type: string, enum: [press_release, social_post, internal_memo], default: press_release }
        alert_id:  { type: string, format: uuid, description: "Optional: pull alert context into the draft" }
        draftId:   { type: string, format: uuid, description: "Existing draft ID (for regeneration with feedback)" }
        feedback:  { type: string, description: "Revision notes for regeneration" }
    StatementResult:
      type: object
      required: [draftId, keyword, tone, type, draft, wordCount, generatedAt, regenerateUrl]
      properties:
        draftId:       { type: string, format: uuid }
        keyword:       { type: string }
        alertId:       { type: string, nullable: true, format: uuid }
        tone:          { type: string, enum: [formal, empathetic, assertive] }
        type:          { type: string, enum: [press_release, social_post, internal_memo] }
        draft:         { type: string }
        wordCount:     { type: integer }
        generatedAt:   { type: string, format: date-time }
        regenerateUrl: { type: string }
    CounterNarrativeInput:
      type: object
      required: [keyword]
      properties:
        keyword:  { type: string }
        alert_id: { type: string, format: uuid, description: "Optional: pull crisis alert context" }
    CounterNarrativeStrategy:
      type: object
      required: [angle, rationale, sampleMessage, predictedEffectiveness, targetAudience]
      properties:
        angle:                   { type: string }
        rationale:               { type: string }
        sampleMessage:           { type: string }
        predictedEffectiveness:  { type: string, enum: [high, medium, low] }
        targetAudience:          { type: string }
    CounterNarrativeResult:
      type: object
      required: [keyword, dominantNarratives, strategies, generatedAt]
      properties:
        keyword:            { type: string }
        dominantNarratives: { type: array, items: { type: string } }
        strategies:
          type: array
          items:
            $ref: "#/components/schemas/CounterNarrativeStrategy"
        generatedAt: { type: string, format: date-time }
    TestMessageVariant:
      type: object
      required: [label, message]
      properties:
        label:   { type: string, description: "Short label for this variant (e.g. 'Empathetic', 'Direct')" }
        message: { type: string, description: "The message text to test" }
    TestMessageInput:
      type: object
      required: [category]
      properties:
        messages:
          type: array
          description: Canonical input - plain string messages (2-5 required)
          items: { type: string }
          minItems: 2
          maxItems: 5
        variants:
          type: array
          description: Legacy input shape - use messages[] instead
          items:
            $ref: "#/components/schemas/TestMessageVariant"
          minItems: 2
          maxItems: 5
        category:  { type: string }
        geography: { type: string }
    TestMessageVariantResult:
      type: object
      required: [label, sentimentScore, reachScore, supporterPercent, detractorPercent, keyThemes, strengths, weaknesses]
      properties:
        label:            { type: string }
        sentimentScore:   { type: number, minimum: -1, maximum: 1 }
        reachScore:       { type: number, minimum: 0, maximum: 1 }
        supporterPercent: { type: number, minimum: 0, maximum: 100 }
        detractorPercent: { type: number, minimum: 0, maximum: 100 }
        keyThemes:        { type: array, items: { type: string } }
        strengths:        { type: array, items: { type: string } }
        weaknesses:       { type: array, items: { type: string } }
    TestMessageResult:
      type: object
      required: [status, category, variantCount, variants, recommendedLabel, rationale, ranking]
      properties:
        status:           { type: string, enum: [completed] }
        category:         { type: string }
        geography:        { type: string, nullable: true }
        variantCount:     { type: integer }
        variants:
          type: array
          items: { $ref: "#/components/schemas/TestMessageVariantResult" }
        recommendedLabel: { type: string }
        rationale:        { type: string }
        ranking:          { type: array, items: { type: string } }
    Campaign:
      type: object
      required: [id, orgId, name, targetKeywords, startDate, status, createdAt, updatedAt]
      properties:
        id:                     { type: string, format: uuid }
        orgId:                  { type: string, format: uuid }
        name:                   { type: string }
        targetKeywords:         { type: array, items: { type: string } }
        startDate:              { type: string, format: date-time }
        baselinePeriodStart:    { type: string, nullable: true, format: date-time }
        baselinePeriodEnd:      { type: string, nullable: true, format: date-time }
        goal:                   { type: string, nullable: true }
        status:                 { type: string, enum: [active, paused, completed] }
        baselineKeywordVolume:  { type: number, nullable: true }
        baselineSentiment:      { type: number, nullable: true }
        baselineSov:            { type: number, nullable: true }
        createdAt:              { type: string, format: date-time }
        updatedAt:              { type: string, format: date-time }
    CampaignList:
      type: object
      required: [count, data]
      properties:
        count: { type: integer }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
    CreateCampaignInput:
      type: object
      required: [name, targetKeywords]
      properties:
        name:           { type: string }
        targetKeywords: { type: array, items: { type: string }, minItems: 1 }
        startDate:      { type: string, format: date-time, description: "Launch date (defaults to now)" }
        goal:           { type: string }
    CampaignMeasurement:
      type: object
      required: [id, campaignId, measuredAt, keywordVolume, sentimentScore, sovPercent, mediaPickupCount, emv]
      properties:
        id:               { type: string, format: uuid }
        campaignId:       { type: string, format: uuid }
        measuredAt:       { type: string, format: date-time }
        keywordVolume:    { type: integer }
        sentimentScore:   { type: number }
        sovPercent:       { type: number }
        mediaPickupCount: { type: integer }
        emv:              { type: number, description: "Earned media value in thousands of USD" }
    Member:
      type: object
      required: [id, orgId, fullName, status, createdAt, updatedAt]
      properties:
        id:              { type: string, format: uuid }
        orgId:           { type: string, format: uuid }
        fullName:        { type: string }
        email:           { type: string, nullable: true }
        phone:           { type: string, nullable: true }
        externalRef:     { type: string, nullable: true }
        notes:           { type: string, nullable: true }
        status:          { type: string }
        consentGivenAt:  { type: string, format: date-time, nullable: true }
        consentVersion:  { type: string, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    MemberListItem:
      allOf:
        - $ref: "#/components/schemas/Member"
        - type: object
          required: [faceCount]
          properties:
            faceCount: { type: integer }
    MemberList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MemberListItem"
        total: { type: integer }
    EnrolledFace:
      type: object
      required: [id, createdAt]
      properties:
        id:        { type: string, format: uuid }
        quality:   { type: number, nullable: true }
        createdAt: { type: string, format: date-time }
    MemberDetail:
      allOf:
        - $ref: "#/components/schemas/Member"
        - type: object
          required: [faces]
          properties:
            faces:
              type: array
              items:
                $ref: "#/components/schemas/EnrolledFace"
    CreateMemberInput:
      type: object
      required: [fullName]
      properties:
        fullName:     { type: string }
        email:        { type: string }
        phone:        { type: string }
        externalRef:  { type: string }
        notes:        { type: string }
        consentGiven: { type: boolean, description: "If true, records biometric consent at creation time" }
    UpdateMemberInput:
      type: object
      properties:
        fullName:    { type: string }
        email:       { type: string }
        phone:       { type: string }
        externalRef: { type: string }
        notes:       { type: string }
        status:      { type: string, enum: [active, suspended] }
    EnrollFaceInput:
      type: object
      required: [imageBase64]
      properties:
        imageBase64: { type: string, description: "JPEG image as base64 (data URI prefix optional)" }
    FaceEnrollmentResult:
      type: object
      required: [face, embeddingCount]
      properties:
        face:
          $ref: "#/components/schemas/EnrolledFace"
        embeddingCount: { type: integer }
    AccessPoint:
      type: object
      required: [id, orgId, name, isActive, createdAt, updatedAt]
      properties:
        id:          { type: string, format: uuid }
        orgId:       { type: string, format: uuid }
        name:        { type: string }
        description: { type: string, nullable: true }
        isActive:    { type: boolean }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
    AccessPointList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AccessPoint"
        total: { type: integer }
    CreateAccessPointInput:
      type: object
      required: [name]
      properties:
        name:        { type: string }
        description: { type: string }
    UpdateAccessPointInput:
      type: object
      properties:
        name:        { type: string }
        description: { type: string }
        isActive:    { type: boolean }
    AccessGrant:
      type: object
      required: [id, memberId, accessPointId, isActive, createdAt]
      properties:
        id:              { type: string, format: uuid }
        orgId:           { type: string, format: uuid }
        memberId:        { type: string, format: uuid }
        accessPointId:   { type: string, format: uuid }
        isActive:        { type: boolean }
        validFrom:       { type: string, format: date-time, nullable: true }
        validUntil:      { type: string, format: date-time, nullable: true }
        createdAt:       { type: string, format: date-time }
        memberName:      { type: string, nullable: true }
        accessPointName: { type: string, nullable: true }
    AccessGrantList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AccessGrant"
        total: { type: integer }
    CreateGrantInput:
      type: object
      required: [memberId, accessPointId]
      properties:
        memberId:      { type: string, format: uuid }
        accessPointId: { type: string, format: uuid }
    IdentifyInput:
      type: object
      required: [imageBase64, accessPointId]
      properties:
        imageBase64:   { type: string, description: "JPEG image as base64 (data URI prefix optional)" }
        accessPointId: { type: string, format: uuid }
    IdentifyMember:
      type: object
      required: [id, fullName]
      properties:
        id:       { type: string, format: uuid }
        fullName: { type: string }
    IdentifyAccessPoint:
      type: object
      required: [id, name]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string }
    IdentifyResult:
      type: object
      required: [decision, reason, accessPoint]
      properties:
        decision: { type: string, enum: [granted, denied] }
        reason:   { type: string, enum: [matched, no_match, no_face_detected, no_grant, member_suspended] }
        member:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/IdentifyMember"
        distance: { type: number, nullable: true }
        accessPoint:
          $ref: "#/components/schemas/IdentifyAccessPoint"
    AccessEvent:
      type: object
      required: [id, decision, reason, createdAt]
      properties:
        id:              { type: string, format: uuid }
        decision:        { type: string, enum: [granted, denied] }
        reason:          { type: string }
        distance:        { type: number, nullable: true }
        createdAt:       { type: string, format: date-time }
        memberId:        { type: string, format: uuid, nullable: true }
        memberName:      { type: string, nullable: true }
        accessPointId:   { type: string, format: uuid, nullable: true }
        accessPointName: { type: string, nullable: true }
    AccessEventList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AccessEvent"
        total: { type: integer }
