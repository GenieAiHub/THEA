openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: THEA — Total Human Engagement Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health and readiness checks
  - name: content
    description: Collected content items
  - name: trends
    description: Trend scores and analysis
  - name: analysis
    description: MiroFish analysis reports
  - name: watchlist
    description: Per-org watchlist keyword management
  - name: alerts
    description: Spike and crisis alerts
  - name: crawler
    description: Crawler source management and collection run logs
  - name: intelligence
    description: AI-powered intelligence tools (talking points, drafts, simulator)
  - name: geo
    description: Geographic heat map intelligence
  - name: reports
    description: Report generation (PDF, PPTX)
  - name: webhooks
    description: Webhook registration and delivery
  - name: admin
    description: Platform operator admin endpoints
  - name: markets
    description: THEA Markets — public prediction polls generated from trend data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Basic health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /v1/health:
    get:
      operationId: healthCheckV1
      tags: [health]
      summary: Detailed health check with service status
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedHealthStatus"
        "503":
          description: One or more services unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedHealthStatus"
  /v1/content:
    get:
      operationId: listContent
      tags: [content]
      summary: List collected content items with filters
      parameters:
        - name: platform
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: language
          in: query
          schema: { type: string }
        - name: startDate
          in: query
          schema: { type: string, format: date-time }
        - name: endDate
          in: query
          schema: { type: string, format: date-time }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Content items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItemList"
  /v1/content/{id}:
    get:
      operationId: getContentItem
      tags: [content]
      summary: Get a single content item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"
        "404":
          description: Not found
  /v1/trends:
    get:
      operationId: listTrends
      tags: [trends]
      summary: List trending topics with scores
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: timeframe
          in: query
          schema: { type: string, enum: [24h, 7d, 30d], default: 24h }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Trend scores list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendScoreList"
  /v1/trends/categories:
    get:
      operationId: listCategories
      tags: [trends]
      summary: List all available trend categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: string }
  /v1/trends/{topic}:
    get:
      operationId: getTrendHistory
      tags: [trends]
      summary: Get trend score history for a specific topic
      parameters:
        - name: topic
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trend score history
  /v1/analysis/latest:
    get:
      operationId: getLatestAnalysis
      tags: [analysis]
      summary: Get the latest analysis report for each category
      responses:
        "200":
          description: Latest analysis reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisReportList"
  /v1/analysis/history:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get historical analysis reports
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Analysis report history
  /v1/analysis/category/{category}:
    get:
      operationId: getCategoryAnalysis
      tags: [analysis]
      summary: Get the latest analysis report for a specific category
      parameters:
        - name: category
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Category analysis report
        "404":
          description: No report found
  /v1/analysis/run:
    post:
      operationId: triggerAnalysisRun
      tags: [analysis]
      summary: Manually trigger a MiroFish analysis run
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRunInput"
      responses:
        "202":
          description: Analysis run queued
  /v1/watchlist:
    get:
      operationId: listWatchlistKeywords
      tags: [watchlist]
      summary: List all watchlist keywords for the org
      responses:
        "200":
          description: Watchlist keywords
    post:
      operationId: createWatchlistKeyword
      tags: [watchlist]
      summary: Add a keyword to the watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatchlistKeyword"
      responses:
        "201":
          description: Created
  /v1/watchlist/{id}:
    patch:
      operationId: updateWatchlistKeyword
      tags: [watchlist]
      summary: Update a watchlist keyword
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteWatchlistKeyword
      tags: [watchlist]
      summary: Remove a watchlist keyword
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts for the org
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema: { type: string, enum: [low, medium, high, critical] }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Alerts list
  /v1/alerts/{id}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get a single alert by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Alert detail
        "404":
          description: Not found
  /v1/alerts/{id}/resolve:
    patch:
      operationId: resolveAlert
      tags: [alerts]
      summary: Mark an alert as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Resolved
  /v1/crawler/sources:
    get:
      operationId: listCrawlerSources
      tags: [crawler]
      summary: List all configured crawler sources
      responses:
        "200":
          description: Crawler sources
    post:
      operationId: createCrawlerSource
      tags: [crawler]
      summary: Add a new crawler/RSS source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrawlerSource"
      responses:
        "201":
          description: Created
  /v1/crawler/sources/{id}:
    patch:
      operationId: updateCrawlerSource
      tags: [crawler]
      summary: Update a crawler source (enable/disable, config)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteCrawlerSource
      tags: [crawler]
      summary: Remove a crawler source
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/crawler/runs:
    get:
      operationId: listCollectionRuns
      tags: [crawler]
      summary: List recent collection run logs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Collection runs
  /v1/webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List registered webhooks for the org
      responses:
        "200":
          description: Webhook registrations
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhook"
      responses:
        "201":
          description: Webhook created with signing secret
  /v1/webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Remove a webhook registration
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/intelligence/chat:
    post:
      operationId: llmChat
      tags: [intelligence]
      summary: Send a chat message to GPT or Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmChatInput"
      responses:
        "200":
          description: LLM response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmReply"
        "400":
          description: API key not configured or bad request
        "502":
          description: LLM provider error
  /v1/intelligence/talking-points:
    post:
      operationId: generateTalkingPoints
      tags: [intelligence]
      summary: Generate talking points for a topic using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalkingPointsInput"
      responses:
        "200":
          description: Talking points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalkingPointsResult"
        "400":
          description: API key not configured
  /v1/intelligence/draft-statement:
    post:
      operationId: draftStatement
      tags: [intelligence]
      summary: Draft a public statement on a topic using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftStatementInput"
      responses:
        "200":
          description: Drafted statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementResult"
        "400":
          description: API key not configured
  /v1/admin/configs:
    get:
      operationId: adminListConfigs
      tags: [admin]
      summary: List all platform configuration keys (secrets masked)
      responses:
        "200":
          description: Platform configs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformConfig"
    post:
      operationId: adminBulkUpsertConfigs
      tags: [admin]
      summary: Bulk upsert multiple config values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkConfigInput"
      responses:
        "200":
          description: Updated configs
  /v1/admin/configs/{key}:
    get:
      operationId: adminGetConfig
      tags: [admin]
      summary: Get a single platform config
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Config entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConfig"
        "404":
          description: Not found
    put:
      operationId: adminUpsertConfig
      tags: [admin]
      summary: Create or update a platform config value
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformConfigInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConfig"
        "201":
          description: Created
    delete:
      operationId: adminDeleteConfig
      tags: [admin]
      summary: Delete a platform config entry
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /v1/admin/orgs:
    get:
      operationId: adminListOrgs
      tags: [admin]
      summary: List all organizations (admin only)
      responses:
        "200":
          description: Organizations
  /v1/admin/subscriptions:
    get:
      operationId: adminListSubscriptions
      tags: [admin]
      summary: List all subscriptions (admin only)
      responses:
        "200":
          description: Subscriptions
  /v1/admin/llm-usage:
    get:
      operationId: adminGetLlmUsage
      tags: [admin]
      summary: Get LLM usage logs (admin only)
      responses:
        "200":
          description: LLM usage
  /v1/admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Platform-wide stats (admin only)
      responses:
        "200":
          description: Platform stats
  /v1/reports/pdf:
    post:
      operationId: generatePdfReport
      tags: [reports]
      summary: Generate a white-label PDF report (Phase 8)
      responses:
        "501":
          description: Not yet implemented
  /v1/intelligence/simulate:
    post:
      operationId: runWhatIfSimulation
      tags: [intelligence]
      summary: Run a MiroFish What-If simulation (Phase 5)
      responses:
        "501":
          description: Not yet implemented
  /v1/markets:
    get:
      operationId: listMarkets
      tags: [markets]
      summary: List public prediction markets
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [open, closed, resolved] }
        - name: category
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [trending, newest, closing], default: trending }
        - name: search
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Markets list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketList"
  /v1/markets/categories:
    get:
      operationId: listMarketCategories
      tags: [markets]
      summary: List market categories with counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketCategory"
  /v1/markets/stats:
    get:
      operationId: getMarketStats
      tags: [markets]
      summary: Public stats for the markets platform
      responses:
        "200":
          description: Market stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketStats"
  /v1/markets/{id}:
    get:
      operationId: getMarket
      tags: [markets]
      summary: Get a single market by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Market detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
        "404":
          description: Not found
  /v1/markets/{id}/vote:
    post:
      operationId: voteOnMarket
      tags: [markets]
      summary: Cast a vote on a market option (one vote per voter per market)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketVoteInput"
      responses:
        "200":
          description: Updated market after vote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
        "404":
          description: Market not found
        "409":
          description: Already voted or market closed
  /v1/admin/markets:
    get:
      operationId: adminListMarkets
      tags: [admin]
      summary: List all markets including closed (admin only)
      responses:
        "200":
          description: All markets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketList"
    post:
      operationId: adminCreateMarket
      tags: [admin]
      summary: Manually create a market (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
  /v1/admin/markets/generate:
    post:
      operationId: adminGenerateMarkets
      tags: [admin]
      summary: Trigger LLM market generation from trend data now (admin only)
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketGenerationResult"
  /v1/admin/markets/{id}:
    patch:
      operationId: adminUpdateMarket
      tags: [admin]
      summary: Update a market (close, resolve, edit) (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketUpdate"
      responses:
        "200":
          description: Updated market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"
        "404":
          description: Not found
    delete:
      operationId: adminDeleteMarket
      tags: [admin]
      summary: Delete a market (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /v1/admin/market-settings:
    get:
      operationId: adminGetMarketSettings
      tags: [admin]
      summary: Get market auto-generation settings (admin only)
      responses:
        "200":
          description: Market generation settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSettings"
    put:
      operationId: adminUpdateMarketSettings
      tags: [admin]
      summary: Update market auto-generation settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSettings"
  /v1/geo/heatmap:
    get:
      operationId: getGeoHeatmap
      tags: [geo]
      summary: Geographic heat map for a topic
      description: Returns intensity + mention counts per country/region derived from collected content items.
      security:
        - ClerkJWT: []
        - AdminToken: []
      parameters:
        - name: topic
          in: query
          required: true
          schema: { type: string }
        - name: timeframe
          in: query
          schema: { type: string, enum: [1h, 6h, 24h, 7d], default: 24h }
        - name: format
          in: query
          schema: { type: string, enum: [json, geojson], default: json }
      responses:
        "200":
          description: Heat map data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoHeatmapResult"
        "400": { description: topic is required }
        "401": { description: Unauthorized }
  /v1/watchlist/sov:
    get:
      operationId: getShareOfVoice
      tags: [watchlist]
      summary: Competitor share-of-voice comparison
      description: Returns mention counts and share percentages for all brand/competitor keywords vs your tracked terms.
      security:
        - ClerkJWT: []
        - AdminToken: []
      parameters:
        - name: timeframe
          in: query
          schema: { type: string, enum: [1h, 6h, 24h, 7d], default: 24h }
      responses:
        "200":
          description: Share of voice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareOfVoiceResult"
        "401": { description: Unauthorized }
  /v1/watchlist/{id}/analysis:
    get:
      operationId: getKeywordAnalysis
      tags: [watchlist]
      summary: Crisis score + spike history for a keyword
      description: Returns live crisis probability, 24-hour score history, and recent alerts for a specific watchlist keyword.
      security:
        - ClerkJWT: []
        - AdminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Keyword analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordAnalysisResult"
        "401": { description: Unauthorized }
        "404": { description: Keyword not found }
  /v1/watchlist/scan:
    post:
      operationId: triggerWatchlistScan
      tags: [watchlist]
      summary: Manually trigger spike detection scan
      description: Triggers spike detection for the org's watchlist immediately. Requires owner or admin role.
      security:
        - ClerkJWT: []
        - AdminToken: []
      responses:
        "202": { description: Scan triggered }
        "401": { description: Unauthorized }
        "403": { description: Insufficient role }
  /v1/intelligence/organic-confidence:
    get:
      operationId: getOrganicConfidence
      tags: [intelligence]
      summary: Bot detection / organic confidence score for a topic
      description: Analyses recent content for a topic and returns an organic confidence score (0-100%) and bot/coordination signals.
      security:
        - ClerkJWT: []
        - AdminToken: []
      parameters:
        - name: topic
          in: query
          required: true
          schema: { type: string }
        - name: timeframe
          in: query
          schema: { type: string, enum: [1h, 6h, 24h, 7d], default: 6h }
      responses:
        "200":
          description: Bot detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganicConfidenceResult"
        "400": { description: topic is required }
        "401": { description: Unauthorized }
  /v1/intelligence/influencers:
    get:
      operationId: getInfluencers
      tags: [intelligence]
      summary: Top amplifier accounts for a topic
      description: Returns top accounts by reach score for a topic, ranked by reach × engagement. Flags suspected bots.
      security:
        - ClerkJWT: []
        - AdminToken: []
      parameters:
        - name: topic
          in: query
          required: true
          schema: { type: string }
        - name: timeframe
          in: query
          schema: { type: string, enum: [1h, 6h, 24h, 7d], default: 24h }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: Influencer scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfluencerListResult"
        "400": { description: topic is required }
        "401": { description: Unauthorized }
  /v1/intelligence/check-disinformation:
    post:
      operationId: checkDisinformation
      tags: [intelligence]
      summary: LLM-based disinformation check for recent content
      description: Analyses recent content matching a keyword and flags items with verifiably false claims. Requires admin role and a configured LLM key.
      security:
        - ClerkJWT: []
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keyword]
              properties:
                keyword: { type: string }
      responses:
        "200":
          description: Disinformation check results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisinformationCheckResult"
        "400": { description: keyword is required }
        "401": { description: Unauthorized }
        "403": { description: Insufficient role }
  /v1/intelligence/simulate:
    post:
      operationId: createSimulation
      tags: [intelligence]
      summary: MiroFish "What If" simulator
      description: >
        Queues a What-If MiroFish simulation with an injected hypothetical scenario.
        Returns a simulation ID for polling. Pro/Enterprise only.
      security:
        - ClerkJWT: []
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateInput"
      responses:
        "202":
          description: Simulation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateQueued"
        "400": { description: scenario_text and category are required }
        "401": { description: Unauthorized }
        "402": { description: Pro or Enterprise plan required }
  /v1/intelligence/simulate/{id}:
    get:
      operationId: getSimulation
      tags: [intelligence]
      summary: Poll simulation status and results
      security:
        - ClerkJWT: []
        - AdminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Simulation result or pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"
        "401": { description: Unauthorized }
        "404": { description: Simulation not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key for Enterprise developer access (prefix: thea_)"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DetailedHealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        services:
          type: object
          properties:
            database:
              type: string
            redis:
              type: string
            elasticsearch:
              type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [status, services, timestamp]
    ContentItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        platform: { type: string }
        title: { type: string, nullable: true }
        body: { type: string }
        author: { type: string, nullable: true }
        language: { type: string, nullable: true }
        category: { type: string, nullable: true }
        sentimentScore: { type: number, nullable: true }
        sourceUrl: { type: string, nullable: true }
        geoCountry: { type: string, nullable: true }
        collectedAt: { type: string, format: date-time }
    ContentItemList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
        pagination:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            offset: { type: integer }
    TrendScore:
      type: object
      properties:
        id: { type: string, format: uuid }
        topic: { type: string }
        category: { type: string }
        score: { type: number }
        lifecycleStage: { type: string, nullable: true }
        mentionCount: { type: integer, nullable: true }
        sentimentAvg: { type: number, nullable: true }
        scoredAt: { type: string, format: date-time }
    TrendScoreList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TrendScore"
        timeframe: { type: string }
    AnalysisReport:
      type: object
      properties:
        id: { type: string, format: uuid }
        category: { type: string }
        status: { type: string }
        narrativeSummary: { type: string, nullable: true }
        sentimentOverall: { type: string, nullable: true }
        itemsAnalyzed: { type: integer, nullable: true }
        runAt: { type: string, format: date-time }
    AnalysisReportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisReport"
    CreateWatchlistKeyword:
      type: object
      required: [keyword]
      properties:
        keyword: { type: string }
        type: { type: string, enum: [keyword, brand, person, competitor] }
        category: { type: string }
        notes: { type: string }
    CreateCrawlerSource:
      type: object
      required: [name, url, category]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        type: { type: string, enum: [rss, crawl, api] }
        category: { type: string }
        language: { type: string }
        country: { type: string }
    CreateWebhook:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
    LlmMessage:
      type: object
      required: [role, content]
      properties:
        role:    { type: string, enum: [user, assistant, system] }
        content: { type: string }
    LlmChatInput:
      type: object
      required: [messages]
      properties:
        provider: { type: string, enum: [openai, gemini], default: openai }
        model:    { type: string }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/LlmMessage"
    LlmUsage:
      type: object
      properties:
        promptTokens:     { type: integer }
        completionTokens: { type: integer }
        totalTokens:      { type: integer }
    LlmReply:
      type: object
      properties:
        provider:  { type: string }
        model:     { type: string }
        content:   { type: string }
        usage:
          $ref: "#/components/schemas/LlmUsage"
        durationMs: { type: integer }
    TalkingPointsInput:
      type: object
      required: [topic]
      properties:
        topic:    { type: string }
        context:  { type: string }
        provider: { type: string, enum: [openai, gemini] }
    TalkingPointsResult:
      type: object
      properties:
        topic:         { type: string }
        talkingPoints: { type: string }
        provider:      { type: string }
        model:         { type: string }
    DraftStatementInput:
      type: object
      required: [topic]
      properties:
        topic:    { type: string }
        tone:     { type: string }
        audience: { type: string }
        provider: { type: string, enum: [openai, gemini] }
    StatementResult:
      type: object
      properties:
        topic:     { type: string }
        statement: { type: string }
        provider:  { type: string }
        model:     { type: string }
    PlatformConfig:
      type: object
      properties:
        id:          { type: string, format: uuid }
        key:         { type: string }
        category:    { type: string }
        label:       { type: string }
        description: { type: ["string", "null"] }
        isSecret:    { type: boolean }
        isActive:    { type: boolean }
        hasValue:    { type: boolean }
        value:       { type: ["string", "null"] }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
    PlatformConfigInput:
      type: object
      properties:
        value:       { type: string }
        label:       { type: string }
        description: { type: string }
        category:    { type: string }
        isSecret:    { type: boolean }
        isActive:    { type: boolean }
    BulkConfigInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [key, value]
            properties:
              key:   { type: string }
              value: { type: string }
    AnalysisRunInput:
      type: object
      properties:
        category: { type: string }
    MarketOption:
      type: object
      required: [label, votes, percentage]
      properties:
        label:      { type: string }
        votes:      { type: integer }
        percentage: { type: number }
    Market:
      type: object
      required: [id, question, category, options, totalVotes, status, createdAt]
      properties:
        id:             { type: string, format: uuid }
        question:       { type: string }
        description:    { type: ["string", "null"] }
        category:       { type: string }
        options:
          type: array
          items:
            $ref: "#/components/schemas/MarketOption"
        totalVotes:     { type: integer }
        status:         { type: string, enum: [open, closed, resolved] }
        resolvedOption: { type: ["integer", "null"] }
        source:         { type: string, enum: [auto, manual] }
        sourceTopic:    { type: ["string", "null"] }
        closesAt:       { type: ["string", "null"], format: date-time }
        createdAt:      { type: string, format: date-time }
    MarketList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Market"
    MarketCategory:
      type: object
      required: [category, count]
      properties:
        category: { type: string }
        count:    { type: integer }
    MarketStats:
      type: object
      required: [totalMarkets, openMarkets, totalVotes, categories]
      properties:
        totalMarkets: { type: integer }
        openMarkets:  { type: integer }
        totalVotes:   { type: integer }
        categories:   { type: integer }
    MarketVoteInput:
      type: object
      required: [optionIndex, voterId]
      properties:
        optionIndex: { type: integer, minimum: 0 }
        voterId:     { type: string, minLength: 8, maxLength: 128 }
    MarketInput:
      type: object
      required: [question, category, options]
      properties:
        question:    { type: string, minLength: 1 }
        description: { type: string }
        category:    { type: string, minLength: 1 }
        options:
          type: array
          minItems: 2
          maxItems: 6
          items: { type: string, minLength: 1 }
        closesAt:    { type: string, format: date-time }
    MarketUpdate:
      type: object
      properties:
        question:       { type: string, minLength: 1 }
        description:    { type: string }
        category:       { type: string }
        status:         { type: string, enum: [open, closed, resolved] }
        resolvedOption: { type: integer, minimum: 0 }
        closesAt:       { type: ["string", "null"], format: date-time }
    MarketGenerationResult:
      type: object
      required: [generated, markets]
      properties:
        generated: { type: integer }
        markets:
          type: array
          items:
            $ref: "#/components/schemas/Market"
        message:   { type: string }
    MarketSettings:
      type: object
      required: [enabled, frequencyMinutes, topics, marketsPerRun]
      properties:
        enabled:          { type: boolean }
        frequencyMinutes: { type: integer }
        topics:
          type: array
          items: { type: string }
        marketsPerRun:    { type: integer }
        lastRunAt:        { type: ["string", "null"], format: date-time }
    MarketSettingsInput:
      type: object
      properties:
        enabled:          { type: boolean }
        frequencyMinutes: { type: integer, minimum: 5, maximum: 10080 }
        topics:
          type: array
          items: { type: string }
        marketsPerRun:    { type: integer, minimum: 1, maximum: 10 }
    GeoHeatmapEntry:
      type: object
      required: [countryCode, intensity, mentionCount]
      properties:
        countryCode:    { type: string }
        region:         { type: ["string", "null"] }
        intensity:      { type: integer, minimum: 0, maximum: 100 }
        mentionCount:   { type: integer }
        avgSentiment:   { type: ["number", "null"] }
    GeoHeatmapResult:
      type: object
      required: [data, topic, timeframe, totalCountries, generatedAt]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GeoHeatmapEntry"
        topic:          { type: string }
        timeframe:      { type: string }
        totalCountries: { type: integer }
        generatedAt:    { type: string, format: date-time }
    SovEntry:
      type: object
      required: [keyword, type, mentionCount, sharePercent, trend]
      properties:
        keyword:        { type: string }
        type:           { type: string }
        mentionCount:   { type: integer }
        sharePercent:   { type: number }
        avgSentiment:   { type: ["number", "null"] }
        trend:          { type: string, enum: [up, down, stable] }
    ShareOfVoiceResult:
      type: object
      required: [entries, totalMentions, timeframe, generatedAt]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/SovEntry"
        totalMentions:  { type: integer }
        timeframe:      { type: string }
        generatedAt:    { type: string, format: date-time }
    CrisisScoreResult:
      type: object
      required: [score, velocityScore, sentimentScore, botScore, mediaPickupScore, spikeRatio]
      properties:
        score:              { type: integer, minimum: 0, maximum: 100 }
        velocityScore:      { type: integer }
        sentimentScore:     { type: integer }
        botScore:           { type: integer }
        mediaPickupScore:   { type: integer }
        sentimentShift:     { type: number }
        spikeRatio:         { type: number }
        volumeCurrent:      { type: number }
        volumeBaseline:     { type: number }
    KeywordAnalysisResult:
      type: object
      required: [keyword, liveScore, scoreHistory, recentAlerts, generatedAt]
      properties:
        keyword:
          type: object
        liveScore:
          $ref: "#/components/schemas/CrisisScoreResult"
        scoreHistory:
          type: array
          items: { type: object }
        recentAlerts:
          type: array
          items: { type: object }
        generatedAt: { type: string, format: date-time }
    OrganicConfidenceResult:
      type: object
      required: [topic, timeframe, organicConfidence, coordinatedItemRatio, avgBotRisk, highRiskCount, totalAnalyzed]
      properties:
        topic:                  { type: string }
        timeframe:              { type: string }
        organicConfidence:      { type: integer, minimum: 0, maximum: 100 }
        coordinatedItemRatio:   { type: number }
        avgBotRisk:             { type: number }
        highRiskCount:          { type: integer }
        totalAnalyzed:          { type: integer }
        flaggedAccounts:
          type: array
          items: { type: string }
    InfluencerEntry:
      type: object
      required: [platform, accountHandle, mentionCount, totalEngagement, reachScore, botRisk, isBotFlagged]
      properties:
        platform:         { type: ["string", "null"] }
        accountHandle:    { type: string }
        mentionCount:     { type: integer }
        totalEngagement:  { type: integer }
        reachScore:       { type: number }
        botRisk:          { type: number }
        isBotFlagged:     { type: string, enum: ["true", "false"] }
    InfluencerListResult:
      type: object
      required: [topic, timeframe, count, data]
      properties:
        topic:    { type: string }
        timeframe: { type: string }
        count:    { type: integer }
        data:
          type: array
          items:
            $ref: "#/components/schemas/InfluencerEntry"
    DisinformationCheckResult:
      type: object
      required: [keyword, checked, results]
      properties:
        keyword:  { type: string }
        checked:  { type: integer }
        results:
          type: array
          items:
            type: object
            required: [itemId, claim, isDisinformation, confidence, reasoning]
            properties:
              itemId:           { type: string, format: uuid }
              claim:            { type: string }
              isDisinformation: { type: boolean }
              confidence:       { type: number, minimum: 0, maximum: 1 }
              reasoning:        { type: string }
    SimulateInput:
      type: object
      required: [scenario_text, category]
      properties:
        scenario_text: { type: string, minLength: 20 }
        category:      { type: string }
        geography:     { type: string }
        provider:      { type: string, enum: [openai, gemini, anthropic] }
    SimulateQueued:
      type: object
      required: [simulationId, status, message, pollUrl]
      properties:
        simulationId: { type: string, format: uuid }
        status:       { type: string, enum: [queued] }
        message:      { type: string }
        pollUrl:      { type: string }
    SimulationResult:
      type: object
      required: [simulationId, status, category, createdAt]
      properties:
        simulationId:       { type: string, format: uuid }
        status:             { type: string, enum: [pending, running, completed, failed] }
        category:           { type: string }
        scenario:           { type: ["string", "null"] }
        geography:          { type: ["string", "null"] }
        createdAt:          { type: string, format: date-time }
        completedAt:        { type: ["string", "null"], format: date-time }
        message:            { type: string }
        trendingTopics:     { type: array, items: { type: object } }
        narrativeSummary:   { type: ["string", "null"] }
        sentimentOverall:   { type: ["string", "null"] }
        predictions:        { type: array, items: { type: object } }
        dominantNarratives: { type: array, items: { type: object } }
        keyEntities:        { type: array, items: { type: object } }
