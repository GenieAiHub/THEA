openapi: 3.0.3
info:
  title: Api
  version: 0.1.0
  description: THEA - Total Human Engagement Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health and readiness checks
  - name: content
    description: Collected content items
  - name: trends
    description: Trend scores and analysis
  - name: analysis
    description: MiroFish analysis reports
  - name: watchlist
    description: Per-org watchlist keyword management
  - name: alerts
    description: Spike and crisis alerts
  - name: crawler
    description: Crawler source management and collection run logs
  - name: intelligence
    description: AI-powered intelligence tools (talking points, drafts, simulator)
  - name: geo
    description: Geographic heat map intelligence
  - name: reports
    description: Report generation (PDF, PPTX)
  - name: webhooks
    description: Webhook registration and delivery
  - name: admin
    description: Platform operator admin endpoints
  - name: markets
    description: THEA Markets - public prediction polls generated from trend data
  - name: members
    description: Enrolled persons (members/attendees) and their biometric face data
  - name: access
    description: Access points, grants, and face-scan identification for physical/service access
  - name: wallet
    description: Custodial user wallet — USD-pegged balance and ledger history for real-money markets
  - name: deposits
    description: Custodial crypto deposits (BTC / ETH / BSC-USDT / CG) crediting the USD-pegged wallet
  - name: watch
    description: Security Watch — camera network visual search (cameras, watch targets, sightings, offline video scans)
  - name: ask-thea
    description: Ask THEA — conversational AI analyst grounded in the org's collected intelligence (Pro tier)
  - name: ai-narrative
    description: AI Narrative Monitor — tracks how AI assistants describe the org's entities over time (Pro tier)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Basic health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /v1/health:
    get:
      operationId: healthCheckV1
      tags: [health]
      summary: Detailed health check with service status
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedHealthStatus"
        "503":
          description: One or more services unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedHealthStatus"
  /v1/content:
    get:
      operationId: listContent
      tags: [content]
      summary: List collected content items with filters
      parameters:
        - name: platform
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: language
          in: query
          schema: { type: string }
        - name: startDate
          in: query
          schema: { type: string, format: date-time }
        - name: endDate
          in: query
          schema: { type: string, format: date-time }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Content items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItemList"
  /v1/content/{id}:
    get:
      operationId: getContentItem
      tags: [content]
      summary: Get a single content item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"
        "404":
          description: Not found
  /v1/trends:
    get:
      operationId: listTrends
      tags: [trends]
      summary: List trending topics with scores
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: timeframe
          in: query
          schema: { type: string, enum: [24h, 7d, 30d], default: 24h }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Trend scores list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendScoreList"
  /v1/trends/categories:
    get:
      operationId: listCategories
      tags: [trends]
      summary: List all available trend categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: string }
  /v1/trends/{topic}:
    get:
      operationId: getTrendHistory
      tags: [trends]
      summary: Get trend score history for a specific topic
      parameters:
        - name: topic
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trend score history
  /v1/analysis/latest:
    get:
      operationId: getLatestAnalysis
      tags: [analysis]
      summary: Get the latest analysis report for each category
      responses:
        "200":
          description: Latest analysis reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisReportList"
  /v1/analysis/history:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get historical analysis reports
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Analysis report history
  /v1/analysis/category/{category}:
    get:
      operationId: getCategoryAnalysis
      tags: [analysis]
      summary: Get the latest analysis report for a specific category
      parameters:
        - name: category
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Category analysis report
        "404":
          description: No report found
  /v1/analysis/run:
    post:
      operationId: triggerAnalysisRun
      tags: [analysis]
      summary: Manually trigger a MiroFish analysis run
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRunInput"
      responses:
        "202":
          description: Analysis run queued
  /v1/watchlist:
    get:
      operationId: listWatchlistKeywords
      tags: [watchlist]
      summary: List all watchlist keywords for the org
      responses:
        "200":
          description: Watchlist keywords
    post:
      operationId: createWatchlistKeyword
      tags: [watchlist]
      summary: Add a keyword to the watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatchlistKeyword"
      responses:
        "201":
          description: Created
  /v1/watchlist/{id}:
    patch:
      operationId: updateWatchlistKeyword
      tags: [watchlist]
      summary: Update a watchlist keyword (type, category, notes, active status)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWatchlistKeyword"
      responses:
        "200":
          description: Updated
        "404":
          description: Not found
    delete:
      operationId: deleteWatchlistKeyword
      tags: [watchlist]
      summary: Remove a watchlist keyword
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts for the org
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema: { type: string, enum: [low, medium, high, critical] }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Alerts list
  /v1/alerts/{id}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get a single alert by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Alert detail
        "404":
          description: Not found
  /v1/alerts/stream:
    get:
      operationId: streamAlerts
      tags: [alerts]
      summary: Server-Sent Events stream of new critical/high alerts
      responses:
        "200":
          description: SSE stream — content-type text/event-stream
  /v1/alerts/{id}/resolve:
    patch:
      operationId: resolveAlert
      tags: [alerts]
      summary: Mark an alert as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Resolved
  /v1/alerts/{id}/dismiss:
    patch:
      operationId: dismissAlert
      tags: [alerts]
      summary: Dismiss an alert without escalation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Dismissed
        "404":
          description: Not found
  /v1/crawler/sources:
    get:
      operationId: listCrawlerSources
      tags: [crawler]
      summary: List all configured crawler sources
      responses:
        "200":
          description: Crawler sources
    post:
      operationId: createCrawlerSource
      tags: [crawler]
      summary: Add a new crawler/RSS source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrawlerSource"
      responses:
        "201":
          description: Created
  /v1/crawler/sources/{id}:
    patch:
      operationId: updateCrawlerSource
      tags: [crawler]
      summary: Update a crawler source (enable/disable, config)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteCrawlerSource
      tags: [crawler]
      summary: Remove a crawler source
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/crawler/runs:
    get:
      operationId: listCollectionRuns
      tags: [crawler]
      summary: List recent collection run logs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Collection runs
  /v1/webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List registered webhooks for the org
      responses:
        "200":
          description: Webhook registrations
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhook"
      responses:
        "201":
          description: Webhook created with signing secret
  /v1/webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Remove a webhook registration
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/intelligence/chat:
    post:
      operationId: llmChat
      tags: [intelligence]
      summary: Send a chat message to GPT or Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmChatInput"
      responses:
        "200":
          description: LLM response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmReply"
        "400":
          description: API key not configured or bad request
        "502":
          description: LLM provider error
  /v1/intelligence/talking-points:
    post:
      operationId: generateTalkingPoints
      tags: [intelligence]
      summary: Generate talking points for a topic using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalkingPointsInput"
      responses:
        "200":
          description: Talking points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalkingPointsResult"
        "400":
          description: API key not configured
  /v1/intelligence/draft-statement:
    post:
      operationId: draftStatement
      tags: [intelligence]
      summary: Draft a public statement on a topic using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftStatementInput"
      responses:
        "200":
          description: Drafted statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementResult"
        "400":
          description: API key not configured
  /v1/intelligence/draft-statement/{draftId}/download:
    get:
      operationId: downloadDraftStatement
      tags: [intelligence]
      summary: Download a generated statement draft as plain text or DOCX
      parameters:
        - name: draftId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: format
          in: query
          schema: { type: string, enum: [txt, docx], default: txt }
      responses:
        "200":
          description: File download
          content:
            text/plain:
              schema: { type: string }
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema: { type: string, format: binary }
        "404":
          description: Draft not found
  /v1/intelligence/counter-narrative:
    post:
      operationId: generateCounterNarrative
      tags: [intelligence]
      summary: Generate counter-narrative reframing strategies for a keyword under attack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CounterNarrativeInput"
      responses:
        "200":
          description: Counter-narrative strategies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterNarrativeResult"
        "400":
          description: Missing keyword or LLM not configured
        "502":
          description: LLM provider error
  /v1/intelligence/test-message:
    post:
      operationId: testMessageResonance
      tags: [intelligence]
      summary: Synchronous side-by-side message resonance comparison for 2-5 variants (Enterprise only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestMessageInput"
      responses:
        "200":
          description: Ranked resonance comparison returned synchronously
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestMessageResult"
        "400":
          description: Invalid input
        "402":
          description: Enterprise tier required
        "502":
          description: LLM call failed
  /v1/campaigns:
    get:
      operationId: listCampaigns
      tags: [intelligence]
      summary: List all campaigns for the org (Pro+)
      responses:
        "200":
          description: Campaigns list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignList"
    post:
      operationId: createCampaign
      tags: [intelligence]
      summary: Create a new campaign tracker (Pro+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignInput"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          description: Invalid input
        "402":
          description: Pro tier required
  /v1/campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [intelligence]
      summary: Get a single campaign with last 30 days of measurements
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Campaign with measurements
        "404":
          description: Not found
    patch:
      operationId: updateCampaign
      tags: [intelligence]
      summary: Update campaign name, status, or keywords
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated campaign
        "404":
          description: Not found
    delete:
      operationId: deleteCampaign
      tags: [intelligence]
      summary: Delete a campaign and all its measurements
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/campaigns/{id}/measurements:
    get:
      operationId: getCampaignMeasurements
      tags: [intelligence]
      summary: Get campaign measurement history
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: days
          in: query
          schema: { type: integer, default: 30, maximum: 90 }
      responses:
        "200":
          description: Measurements
  /v1/campaigns/{id}/measure:
    post:
      operationId: triggerCampaignMeasurement
      tags: [intelligence]
      summary: Manually trigger a campaign measurement now
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Current metrics
        "404":
          description: Not found
  /v1/admin/configs:
    get:
      operationId: adminListConfigs
      tags: [admin]
      summary: List all platform configuration keys (secrets masked)
      responses:
        "200":
          description: Platform configs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformConfig"
    post:
      operationId: adminBulkUpsertConfigs
      tags: [admin]
      summary: Bulk upsert multiple config values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkConfigInput"
      responses:
        "200":
          description: Updated configs
  /v1/admin/configs/{key}:
    get:
      operationId: adminGetConfig
      tags: [admin]
      summary: Get a single platform config
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Config entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConfig"
        "404":
          description: Not found
    put:
      operationId: adminUpsertConfig
      tags: [admin]
      summary: Create or update a platform config value
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformConfigInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConfig"
        "201":
          description: Created
    delete:
      operationId: adminDeleteConfig
      tags: [admin]
      summary: Delete a platform config entry
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /v1/admin/orgs:
    get:
      operationId: adminListOrgs
      tags: [admin]
      summary: List all organizations (admin only)
      responses:
        "200":
          description: Organizations
  /v1/admin/subscriptions:
    get:
      operationId: adminListSubscriptions
      tags: [admin]
      summary: List all subscriptions (admin only)
      responses:
        "200":
          description: Subscriptions
  /v1/admin/llm-usage:
    get:
      operationId: adminGetLlmUsage
      tags: [admin]
      summary: Get LLM usage logs (admin only)
      responses:
        "200":
          description: LLM usage
  /v1/admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Platform-wide stats (admin only)
      responses:
        "200":
          description: Platform stats
  /v1/api-keys:
    get:
      operationId: listApiKeys
      tags: [developer]
      summary: List API keys for the authenticated org (owner/admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of API key metadata wrapped in a data envelope (raw key is never returned)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        name: { type: string }
                        keyPrefix: { type: string }
                        scopes: { type: array, items: { type: string } }
                        isActive: { type: boolean }
                        lastUsedAt: { type: string, format: date-time, nullable: true }
                        expiresAt: { type: string, format: date-time, nullable: true }
                        createdAt: { type: string, format: date-time }
        "401": { description: Unauthenticated }
        "403": { description: Insufficient role or feature not enabled }
    post:
      operationId: createApiKey
      tags: [developer]
      summary: Create a new API key (owner/admin only). Raw key returned once.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                scopes: { type: array, items: { type: string }, default: ["read"] }
                expiresAt: { type: string, format: date-time, nullable: true }
      responses:
        "201":
          description: Created — includes the raw key wrapped in a data envelope (shown once only)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      key: { type: string, description: "Full API key — store securely, not retrievable again" }
                      keyPrefix: { type: string }
        "401": { description: Unauthenticated }
        "403": { description: Insufficient role or feature not enabled }
  /v1/api-keys/{id}:
    patch:
      operationId: updateApiKey
      tags: [developer]
      summary: Update API key name or active status (owner/admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                isActive: { type: boolean }
      responses:
        "200": { description: Updated }
        "404": { description: Not found }
    delete:
      operationId: deleteApiKey
      tags: [developer]
      summary: Revoke and permanently delete an API key (owner/admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "404": { description: Not found }
  /v1/reports/pdf:
    post:
      operationId: generatePdfReport
      tags: [reports]
      summary: Generate a white-label PDF trend report for the authenticated org
      security:
        - cookieAuth: []
        - bearerApiKey: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category: { type: string, description: "Filter to a specific category (optional)" }
      responses:
        "200":
          description: PDF file stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401": { description: Unauthenticated }
        "403": { description: Feature not enabled for this plan }
  /v1/reports/pptx:
    post:
      operationId: generatePptxReport
      tags: [reports]
      summary: Generate a white-label PowerPoint report for the authenticated org
      security:
        - cookieAuth: []
        - bearerApiKey: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category: { type: string, description: "Filter to a specific category (optional)" }
      responses:
        "200":
          description: PPTX file stream
          content:
            application/vnd.openxmlformats-officedocument.presentationml.presentation:
              schema:
                type: string
                format: binary
        "401": { description: Unauthenticated }
        "403": { description: Feature not enabled for this plan }
  /v1/markets:
    get:
      operationId: listMarkets
      tags: [markets]
      summary: List public prediction markets
