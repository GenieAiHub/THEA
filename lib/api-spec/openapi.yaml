openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: THEA — Total Human Engagement Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health and readiness checks
  - name: content
    description: Collected content items
  - name: trends
    description: Trend scores and analysis
  - name: analysis
    description: MiroFish analysis reports
  - name: watchlist
    description: Per-org watchlist keyword management
  - name: alerts
    description: Spike and crisis alerts
  - name: crawler
    description: Crawler source management and collection run logs
  - name: intelligence
    description: AI-powered intelligence tools (talking points, drafts, simulator)
  - name: reports
    description: Report generation (PDF, PPTX)
  - name: webhooks
    description: Webhook registration and delivery
  - name: admin
    description: Platform operator admin endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Basic health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /v1/health:
    get:
      operationId: healthCheckV1
      tags: [health]
      summary: Detailed health check with service status
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedHealthStatus"
        "503":
          description: One or more services unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedHealthStatus"
  /v1/content:
    get:
      operationId: listContent
      tags: [content]
      summary: List collected content items with filters
      parameters:
        - name: platform
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: language
          in: query
          schema: { type: string }
        - name: startDate
          in: query
          schema: { type: string, format: date-time }
        - name: endDate
          in: query
          schema: { type: string, format: date-time }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Content items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItemList"
  /v1/content/{id}:
    get:
      operationId: getContentItem
      tags: [content]
      summary: Get a single content item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"
        "404":
          description: Not found
  /v1/trends:
    get:
      operationId: listTrends
      tags: [trends]
      summary: List trending topics with scores
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: timeframe
          in: query
          schema: { type: string, enum: [24h, 7d, 30d], default: 24h }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Trend scores list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendScoreList"
  /v1/trends/categories:
    get:
      operationId: listCategories
      tags: [trends]
      summary: List all available trend categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: string }
  /v1/trends/{topic}:
    get:
      operationId: getTrendHistory
      tags: [trends]
      summary: Get trend score history for a specific topic
      parameters:
        - name: topic
          in: path
          required: true
          schema: { type: string }
        - name: timeframe
          in: query
          schema: { type: string, enum: [24h, 7d, 30d], default: 24h }
      responses:
        "200":
          description: Trend score history
  /v1/analysis/latest:
    get:
      operationId: getLatestAnalysis
      tags: [analysis]
      summary: Get the latest analysis report for each category
      responses:
        "200":
          description: Latest analysis reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisReportList"
  /v1/analysis/history:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get historical analysis reports
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Analysis report history
  /v1/analysis/category/{category}:
    get:
      operationId: getCategoryAnalysis
      tags: [analysis]
      summary: Get the latest analysis report for a specific category
      parameters:
        - name: category
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Category analysis report
        "404":
          description: No report found
  /v1/analysis/run:
    post:
      operationId: triggerAnalysisRun
      tags: [analysis]
      summary: Manually trigger a MiroFish analysis run
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
      responses:
        "202":
          description: Analysis run queued
  /v1/watchlist:
    get:
      operationId: listWatchlistKeywords
      tags: [watchlist]
      summary: List all watchlist keywords for the org
      responses:
        "200":
          description: Watchlist keywords
    post:
      operationId: createWatchlistKeyword
      tags: [watchlist]
      summary: Add a keyword to the watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatchlistKeyword"
      responses:
        "201":
          description: Created
  /v1/watchlist/{id}:
    patch:
      operationId: updateWatchlistKeyword
      tags: [watchlist]
      summary: Update a watchlist keyword
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteWatchlistKeyword
      tags: [watchlist]
      summary: Remove a watchlist keyword
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts for the org
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema: { type: string, enum: [low, medium, high, critical] }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Alerts list
  /v1/alerts/{id}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get a single alert by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Alert detail
        "404":
          description: Not found
  /v1/alerts/{id}/resolve:
    patch:
      operationId: resolveAlert
      tags: [alerts]
      summary: Mark an alert as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Resolved
  /v1/crawler/sources:
    get:
      operationId: listCrawlerSources
      tags: [crawler]
      summary: List all configured crawler sources
      responses:
        "200":
          description: Crawler sources
    post:
      operationId: createCrawlerSource
      tags: [crawler]
      summary: Add a new crawler/RSS source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrawlerSource"
      responses:
        "201":
          description: Created
  /v1/crawler/sources/{id}:
    patch:
      operationId: updateCrawlerSource
      tags: [crawler]
      summary: Update a crawler source (enable/disable, config)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteCrawlerSource
      tags: [crawler]
      summary: Remove a crawler source
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/crawler/runs:
    get:
      operationId: listCollectionRuns
      tags: [crawler]
      summary: List recent collection run logs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Collection runs
  /v1/webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List registered webhooks for the org
      responses:
        "200":
          description: Webhook registrations
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhook"
      responses:
        "201":
          description: Webhook created with signing secret
  /v1/webhooks/{id}:
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Remove a webhook registration
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
  /v1/admin/orgs:
    get:
      operationId: adminListOrgs
      tags: [admin]
      summary: List all organizations (admin only)
      responses:
        "200":
          description: Organizations
  /v1/admin/subscriptions:
    get:
      operationId: adminListSubscriptions
      tags: [admin]
      summary: List all subscriptions (admin only)
      responses:
        "200":
          description: Subscriptions
  /v1/admin/llm-usage:
    get:
      operationId: adminGetLlmUsage
      tags: [admin]
      summary: Get LLM usage logs (admin only)
      responses:
        "200":
          description: LLM usage
  /v1/admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Platform-wide stats (admin only)
      responses:
        "200":
          description: Platform stats
  /v1/reports/pdf:
    post:
      operationId: generatePdfReport
      tags: [reports]
      summary: Generate a white-label PDF report (Phase 8)
      responses:
        "501":
          description: Not yet implemented
  /v1/intelligence/talking-points:
    post:
      operationId: generateTalkingPoints
      tags: [intelligence]
      summary: Generate talking points for a keyword (Phase 6)
      responses:
        "501":
          description: Not yet implemented
  /v1/intelligence/simulate:
    post:
      operationId: runWhatIfSimulation
      tags: [intelligence]
      summary: Run a MiroFish What-If simulation (Phase 5)
      responses:
        "501":
          description: Not yet implemented
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API key for Enterprise developer access (prefix: thea_)"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DetailedHealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        services:
          type: object
          properties:
            database:
              type: string
            redis:
              type: string
            elasticsearch:
              type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [status, services, timestamp]
    ContentItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        platform: { type: string }
        title: { type: string, nullable: true }
        body: { type: string }
        author: { type: string, nullable: true }
        language: { type: string, nullable: true }
        category: { type: string, nullable: true }
        sentimentScore: { type: number, nullable: true }
        sourceUrl: { type: string, nullable: true }
        geoCountry: { type: string, nullable: true }
        collectedAt: { type: string, format: date-time }
    ContentItemList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
        pagination:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            offset: { type: integer }
    TrendScore:
      type: object
      properties:
        id: { type: string, format: uuid }
        topic: { type: string }
        category: { type: string }
        score: { type: number }
        lifecycleStage: { type: string, nullable: true }
        mentionCount: { type: integer, nullable: true }
        sentimentAvg: { type: number, nullable: true }
        scoredAt: { type: string, format: date-time }
    TrendScoreList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TrendScore"
        timeframe: { type: string }
    AnalysisReport:
      type: object
      properties:
        id: { type: string, format: uuid }
        category: { type: string }
        status: { type: string }
        narrativeSummary: { type: string, nullable: true }
        sentimentOverall: { type: string, nullable: true }
        itemsAnalyzed: { type: integer, nullable: true }
        runAt: { type: string, format: date-time }
    AnalysisReportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisReport"
    CreateWatchlistKeyword:
      type: object
      required: [keyword]
      properties:
        keyword: { type: string }
        type: { type: string, enum: [keyword, brand, person, competitor] }
        category: { type: string }
        notes: { type: string }
    CreateCrawlerSource:
      type: object
      required: [name, url, category]
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        type: { type: string, enum: [rss, crawl, api] }
        category: { type: string }
        language: { type: string }
        country: { type: string }
    CreateWebhook:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
