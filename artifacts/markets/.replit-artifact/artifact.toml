kind = "web"
previewPath = "/markets/"
title = "THEA Markets"
version = "1.0.0"
id = "artifacts/markets"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/markets/" ]
localPort = 25703

[services.development]
run = "pnpm --filter @workspace/markets run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/markets", "run", "build" ]
publicDir = "artifacts/markets/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25703"
BASE_PATH = "/markets/"
