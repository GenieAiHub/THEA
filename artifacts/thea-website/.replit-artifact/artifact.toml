kind = "web"
previewPath = "/"
title = "THEA Website"
version = "1.0.0"
id = "artifacts/thea-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24912

[services.development]
run = "pnpm --filter @workspace/thea-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thea-website", "run", "build" ]
publicDir = "artifacts/thea-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24912"
BASE_PATH = "/"
